<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Filtered Dropout.tv RSS Feed</title>
</head>
<body>
  <h1>Generating your filtered RSS feed...</h1>
  <pre id="output" style="white-space: pre-wrap;"></pre>
  <script>
    async function filterFeed() {
      const params = new URLSearchParams(window.location.search);
      const showFilter = params.get("shows")?.split(',').map(s => s.trim().toLowerCase()) || null;

      const res = await fetch('dropout_feed.xml');
      const text = await res.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "application/xml");

      const channel = xml.querySelector('channel');
      const allItems = Array.from(xml.querySelectorAll('item'));
      const filteredItems = showFilter
        ? allItems.filter(item => {
            const title = item.querySelector('title')?.textContent || '';
            return showFilter.some(show => title.toLowerCase().includes(`[${show}]`.toLowerCase()));
          })
        : allItems;

      const filteredXml = `
<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0">
<channel>
  <title>${channel.querySelector('title')?.textContent}</title>
  <link>${channel.querySelector('link')?.textContent}</link>
  <description>${channel.querySelector('description')?.textContent}</description>
  ${filteredItems.map(item => item.outerHTML).join('\n')}
</channel>
</rss>`;

      // Display it
      document.getElementById("output").textContent = filteredXml;

      // Create download link
      //const blob = new Blob([filteredXml], { type: "application/rss+xml" });
      //const url = URL.createObjectURL(blob);
      //const a = document.createElement('a');
      //a.href = url;
      //a.download = "filtered_dropuot_feed.xml";
      //a.textContent = "Download this filtered feed";
      //document.body.appendChild(a);
    }

    filterFeed();
  </script>
</body>
</html>
